services:
  - type: web
    name: personachat-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PERSONACHAT_CORS_ORIGINS
        value: https://promo-site-six.vercel.app
      - key: PERSONACHAT_ENABLE_GPTSOVITS
        value: false
      - key: PERSONACHAT_ALLOW_LOCAL_VIDEO
        value: false
